  <!--
    ══════════════════════════════════════════════════
    PERFORMANCE — CORE WEB VITALS
    ══════════════════════════════════════════════════

    PROBLEMA: Google Fonts agrega 2-3 requests bloqueantes
    que disparan el LCP (Largest Contentful Paint) en ~400ms.

    SOLUCIÓN: font stack local que usa las fuentes del sistema.
    En macOS/iOS → SF Mono / Menlo (idéntico en calidad)
    En Windows   → Cascadia Code / Consolas
    En Linux     → DejaVu Sans Mono / Liberation Mono
    Fallback      → monospace genérico del browser
    Resultado:    0 requests externos, 0ms de bloqueo.
    ══════════════════════════════════════════════════
  -->

  <!-- <base href="/nano" esto es solo para cuando esta dentro de una subcarpeta> -->
  <link rel="stylesheet" href="app/styles.css">

  <!--
    PRELOAD del script principal y del CSS:
    Le dice al browser que los descargue con máxima prioridad
    mientras parsea el HTML, antes de ejecutar nada.
    Mejora el FCP (First Contentful Paint) en ~100-200ms.
  -->
  <link rel="preload" href="app/styles.css"        as="style">
  <link rel="preload" href="packages/nano.min.js"  as="script" crossorigin>
  <link rel="preload" href="app/main.js"           as="script" crossorigin>

  <!--
    MODULE PRELOAD de todos los módulos de la app:
    El browser descarga el grafo de módulos en paralelo
    en vez de descubrirlos uno a uno al ejecutar.
    Elimina la "cascada de imports" que es el mayor
    problema de rendimiento de ES Modules en producción.
  -->
  <link rel="modulepreload" href="packages/nano.min.js">
  <link rel="modulepreload" href="app/main.js">
  <link rel="modulepreload" href="app/seo.js">
  <link rel="modulepreload" href="app/components/NavBar.js">
  <link rel="modulepreload" href="app/pages/HomePage.js">
  <link rel="modulepreload" href="app/pages/CounterPage.js">
  <link rel="modulepreload" href="app/pages/SignalsPage.js">
  <link rel="modulepreload" href="app/pages/TodoPage.js">
  <link rel="modulepreload" href="app/pages/AboutPage.js">

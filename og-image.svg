<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#080b08"/>
  <!-- Scanlines sutiles -->
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.3"/>
  <defs>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="transparent"/>
      <rect y="2" width="1" height="2" fill="#000" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Grid de fondo -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a2a1a" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a2a1a" stroke-width="1"/>
  <!-- Logo -->
  <text x="80" y="320" font-family="monospace" font-size="220" font-weight="bold"
        fill="#39ff6e" opacity="0.95" letter-spacing="-8">nano</text>
  <!-- Glow del logo -->
  <text x="80" y="320" font-family="monospace" font-size="220" font-weight="bold"
        fill="none" stroke="#39ff6e" stroke-width="1" opacity="0.3"
        filter="url(#glow)" letter-spacing="-8">nano</text>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tagline -->
  <text x="82" y="390" font-family="monospace" font-size="22"
        fill="#4a664a" letter-spacing="2">// micro-framework reactivo en Vanilla JS puro</text>
  <!-- Stats -->
  <rect x="82" y="440" width="160" height="60" rx="6" fill="#0d110d" stroke="#1a2a1a"/>
  <text x="162" y="467" font-family="monospace" font-size="26" font-weight="bold"
        fill="#39ff6e" text-anchor="middle">6.9 KB</text>
  <text x="162" y="487" font-family="monospace" font-size="11"
        fill="#4a664a" text-anchor="middle" letter-spacing="1">minificado</text>

  <rect x="258" y="440" width="160" height="60" rx="6" fill="#0d110d" stroke="#1a2a1a"/>
  <text x="338" y="467" font-family="monospace" font-size="26" font-weight="bold"
        fill="#39ff6e" text-anchor="middle">0</text>
  <text x="338" y="487" font-family="monospace" font-size="11"
        fill="#4a664a" text-anchor="middle" letter-spacing="1">dependencias</text>

  <rect x="434" y="440" width="160" height="60" rx="6" fill="#0d110d" stroke="#1a2a1a"/>
  <text x="514" y="467" font-family="monospace" font-size="26" font-weight="bold"
        fill="#39ff6e" text-anchor="middle">0</text>
  <text x="514" y="487" font-family="monospace" font-size="11"
        fill="#4a664a" text-anchor="middle" letter-spacing="1">build steps</text>
  <!-- Código decorativo a la derecha -->
  <text x="680" y="200" font-family="monospace" font-size="15" fill="#1a3a1a">import { signal, html, Router }</text>
  <text x="680" y="228" font-family="monospace" font-size="15" fill="#1a3a1a">  from 'nano.min.js';</text>
  <text x="680" y="272" font-family="monospace" font-size="15" fill="#1a4a1a">const count = signal(0);</text>
  <text x="680" y="316" font-family="monospace" font-size="15" fill="#1a4a1a">count.subscribe(v => {</text>
  <text x="680" y="340" font-family="monospace" font-size="15" fill="#1a4a1a">  display.textContent = v;</text>
  <text x="680" y="364" font-family="monospace" font-size="15" fill="#1a4a1a">});</text>
  <text x="680" y="408" font-family="monospace" font-size="15" fill="#1a4a1a">count.set(v => v + 1);</text>
</svg>
